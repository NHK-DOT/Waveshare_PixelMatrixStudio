<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32 Matrix PMX</title>
<style>
:root{color-scheme:dark;--bg:#0b1020;--panel:#10192d;--panel2:#141f36;--line:#263149;--text:#e5e7eb;--muted:#94a3b8;--accent:#2563eb;--ok:#a7f3d0;--warn:#fbbf24}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Segoe UI,Microsoft YaHei,Arial,sans-serif}
main{width:min(1180px,94vw);margin:28px auto 36px}.top{text-align:center;margin-bottom:18px}.pill{display:inline-block;padding:6px 12px;border-radius:999px;background:#1e293b;color:#93c5fd;font-size:13px}
h1{font-size:28px;margin:10px 0 8px}.sub{color:var(--muted);line-height:1.65;margin:0}.grid{display:grid;grid-template-columns:300px 1fr 300px;gap:16px;align-items:start}
.card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,var(--panel2),var(--panel));box-shadow:0 20px 60px #0007;padding:18px}.card h2{font-size:16px;margin:0 0 14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;color:#cbd5e1;font-size:13px;margin:10px 0 6px}input,select,button{width:100%;border-radius:12px;border:1px solid #334155;background:#020617;color:#e5e7eb;padding:10px;font:inherit}
input[type=file]{border-style:dashed}input[type=range]{padding:0;accent-color:var(--accent)}button{border:0;background:var(--accent);font-weight:700;cursor:pointer;margin-top:10px}button.secondary{background:#334155}button.ghost{background:#172033;border:1px solid #334155}button:disabled{opacity:.45;cursor:not-allowed}
canvas{display:block;width:100%;background:#020617;border:1px solid #334155;border-radius:12px;image-rendering:pixelated}.sourceWrap{position:relative}.tiny{font-size:12px;color:#64748b;line-height:1.55}.status{min-height:54px;white-space:pre-wrap;color:var(--ok);font-size:13px;line-height:1.55}.warn{color:var(--warn)}.metric{display:grid;grid-template-columns:1fr auto;gap:8px;color:#cbd5e1;font-size:13px;margin-top:8px}.previewCanvas{aspect-ratio:1/1}.sourceCanvas{aspect-ratio:1/1}.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:960px){.grid{grid-template-columns:1fr}.card{padding:16px}main{margin-top:16px}}
</style>
<main>
  <div class="top">
    <div class="pill">ESP32 Matrix PMX</div>
    <h1>无线上传</h1>
    <p class="sub">在浏览器里导入图片或 GIF、裁剪调色、生成 PMX，并通过 HTTPS 写入 ESP32 Flash。网页端不走串口。</p>
  </div>
  <div class="grid">
    <section class="card">
      <h2>输入与裁剪</h2>
      <input id="file" type="file" accept="image/*,.gif,.webp,.pmx">
      <label>裁剪比例</label><input id="aspect" value="1:1">
      <div class="btnrow"><button id="resetCrop" class="secondary">重置裁剪</button><button id="fitCanvas" class="ghost">适配画布</button></div>
      <div class="sourceWrap"><canvas id="source" class="sourceCanvas" width="360" height="360"></canvas></div>
      <p class="tiny">框内拖动移动裁剪框，框外拖动重新选区。支持 PNG、JPG、BMP、WEBP；支持 GIF 多帧需浏览器提供 ImageDecoder。</p>
    </section>
    <section class="card">
      <h2>64x64 LED 预览</h2>
      <canvas id="preview" class="previewCanvas" width="64" height="64"></canvas>
      <div class="metric"><span>源文件</span><b id="srcInfo">未导入</b></div>
      <div class="metric"><span>输出</span><b id="outInfo">未生成</b></div>
      <div class="metric"><span>设备状态</span><b id="devInfo">未查询</b></div>
      <div class="btnrow"><button id="downloadPng" class="secondary">导出 PNG</button><button id="downloadGif" class="secondary">导出 GIF</button></div>
      <div class="btnrow"><button id="downloadPmx" class="secondary">导出 PMX</button><button id="upload">HTTPS 上传到 Flash</button></div>
      <pre id="status" class="status">请选择图片、GIF 或 PMX。</pre>
    </section>
    <section class="card">
      <h2>像素参数</h2>
      <div class="row"><div><label>像素宽度</label><input id="w" type="number" min="1" max="64" value="64"></div><div><label>像素高度</label><input id="h" type="number" min="1" max="64" value="64"></div></div>
      <div class="row"><div><label>画布 X</label><input id="x" type="number" min="-63" max="63" value="0"></div><div><label>画布 Y</label><input id="y" type="number" min="-63" max="63" value="0"></div></div>
      <label>降采样方式</label><select id="mode"><option value="0">清晰最近邻</option><option value="1" selected>多点降采样</option></select>
      <label>亮度 <span id="bv">0</span></label><input id="brightness" type="range" min="-100" max="100" value="0">
      <label>对比度 <span id="cv">0</span></label><input id="contrast" type="range" min="-100" max="100" value="0">
      <label>饱和度 <span id="sv">0</span></label><input id="saturation" type="range" min="-100" max="100" value="0">
      <button id="resetAdjust" class="secondary">增强参数归零</button>
      <p class="tiny">PMX 格式为 64x64 RGB332。HTTPS 上传会暂停显示、擦写 assets 分区、写入 PMX，然后从 Flash 重新加载。</p>
    </section>
  </div>
</main>
<script>
const C=64, FRAME_BYTES=4096, ASSET_CAP=0x2F0000;
const $=id=>document.getElementById(id), st=$('status');
let srcFrames=[], canvasFrames=[], crop={x:0,y:0,w:1,h:1}, dragging=false, moving=false, anchor=null, dragOffset=null, previewIndex=0, timer=0, currentPmx=null;
const source=$('source'), sctx=source.getContext('2d'), preview=$('preview'), pctx=preview.getContext('2d');
pctx.imageSmoothingEnabled=false; sctx.imageSmoothingEnabled=true;
function status(t,warn){st.textContent=t;st.className='status'+(warn?' warn':'')}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function val(id){return $(id).value}
function num(id,fb){const v=parseInt(val(id),10);return Number.isFinite(v)?v:fb}
function parseAspect(){const v=val('aspect').trim(); if(v.includes(':')){const p=v.split(':').map(Number); if(p[0]>0&&p[1]>0)return p[0]/p[1]} const n=Number(v); return n>0?n:1}
function syncLabels(){$('bv').textContent=val('brightness');$('cv').textContent=val('contrast');$('sv').textContent=val('saturation')}
function setFit(){const a=parseAspect();let w=C,h=C;if(a>=1)h=clamp(Math.round(C/a),1,C);else w=clamp(Math.round(C*a),1,C);$('w').value=w;$('h').value=h;$('x').value=Math.floor((C-w)/2);$('y').value=Math.floor((C-h)/2)}
function resetCrop(){if(!srcFrames[0])return;let sw=srcFrames[0].w,sh=srcFrames[0].h,a=parseAspect(),w=sw,h=sh;if(sw/sh>a)w=Math.max(1,Math.round(sh*a));else h=Math.max(1,Math.round(sw/a));crop={x:Math.floor((sw-w)/2),y:Math.floor((sh-h)/2),w,h};drawSource();render(true)}
function rgb332(r,g,b){return (r&224)|((g&224)>>3)|((b&192)>>6)}
function pal(i){return [i&224,(i&28)<<3,(i&3)*85]}
function enhance(r,g,b){let br=num('brightness',0),co=num('contrast',0),sa=num('saturation',0);let cf=1+co/100,sf=1+sa/100;r=(r+br*2.55-128)*cf+128;g=(g+br*2.55-128)*cf+128;b=(b+br*2.55-128)*cf+128;let l=r*.299+g*.587+b*.114;return [clamp(Math.round(l+(r-l)*sf),0,255),clamp(Math.round(l+(g-l)*sf),0,255),clamp(Math.round(l+(b-l)*sf),0,255)]}
async function decodeFile(file){if(file.name.toLowerCase().endsWith('.pmx')){currentPmx=new Uint8Array(await file.arrayBuffer());parsePmx(currentPmx,file.name);return}currentPmx=null;srcFrames=[];if('ImageDecoder' in window){try{const dec=new ImageDecoder({data:file,type:file.type||'image/gif'});await dec.tracks.ready;const tr=dec.tracks.selectedTrack;const count=Math.min(tr.frameCount||1,720);for(let i=0;i<count;i++){const d=await dec.decode({frameIndex:i});srcFrames.push(await frameToRgba(d.image,Math.max(20,Math.round((d.image.duration||100000)/1000))));d.image.close()}dec.close()}catch(e){srcFrames=[]}}
 if(!srcFrames.length){const bmp=await createImageBitmap(file);srcFrames=[await frameToRgba(bmp,100)];bmp.close&&bmp.close()}$('srcInfo').textContent=file.name+' / '+srcFrames.length+' 帧 / '+srcFrames[0].w+'x'+srcFrames[0].h;resetCrop();status('已导入：'+file.name)}
async function frameToRgba(img,delay){const c=document.createElement('canvas');c.width=img.displayWidth||img.width;c.height=img.displayHeight||img.height;const x=c.getContext('2d');x.drawImage(img,0,0,c.width,c.height);return {w:c.width,h:c.height,delay,rgba:x.getImageData(0,0,c.width,c.height)}}
function drawSource(){sctx.clearRect(0,0,source.width,source.height);if(!srcFrames[0])return;const f=srcFrames[0],scale=Math.min(source.width/f.w,source.height/f.h),ox=(source.width-f.w*scale)/2,oy=(source.height-f.h*scale)/2;source._map={scale,ox,oy};const tmp=document.createElement('canvas');tmp.width=f.w;tmp.height=f.h;tmp.getContext('2d').putImageData(f.rgba,0,0);sctx.drawImage(tmp,ox,oy,f.w*scale,f.h*scale);sctx.fillStyle='rgba(2,6,23,.55)';sctx.fillRect(ox,oy,f.w*scale,f.h*scale);sctx.drawImage(tmp,crop.x,crop.y,crop.w,crop.h,ox+crop.x*scale,oy+crop.y*scale,crop.w*scale,crop.h*scale);sctx.strokeStyle='#a7f3d0';sctx.lineWidth=2;sctx.strokeRect(ox+crop.x*scale,oy+crop.y*scale,crop.w*scale,crop.h*scale)}
function pt(e){const r=source.getBoundingClientRect(),m=source._map||{scale:1,ox:0,oy:0};return {x:clamp(Math.round(((e.clientX-r.left)/r.width*source.width-m.ox)/m.scale),0,srcFrames[0].w),y:clamp(Math.round(((e.clientY-r.top)/r.height*source.height-m.oy)/m.scale),0,srcFrames[0].h)}}
function makeCrop(a,b){let asp=parseAspect(),dx=b.x-a.x,dy=b.y-a.y,w=Math.abs(dx),h=Math.abs(dy);if(w<1)w=1;if(h<1)h=Math.max(1,Math.round(w/asp));if(w/h>asp)h=Math.max(1,Math.round(w/asp));else w=Math.max(1,Math.round(h*asp));w=Math.min(w,srcFrames[0].w);h=Math.min(h,srcFrames[0].h);let x=dx>=0?a.x:a.x-w,y=dy>=0?a.y:a.y-h;return{x:clamp(x,0,srcFrames[0].w-w),y:clamp(y,0,srcFrames[0].h-h),w,h}}
function render(previewOnly){if(!srcFrames.length)return false;syncLabels();let ow=clamp(num('w',64),1,64),oh=clamp(num('h',64),1,64),xo=clamp(num('x',0),-63,63),yo=clamp(num('y',0),-63,63),mode=num('mode',1);let frames=previewOnly?[srcFrames[0]]:srcFrames;canvasFrames=frames.map(fr=>pixelate(fr,ow,oh,xo,yo,mode));previewIndex=0;drawPreview();$('outInfo').textContent=canvasFrames.length+' 帧 / '+pmxSize(canvasFrames.length)+' 字节';if(!previewOnly)status('已生成 '+canvasFrames.length+' 帧，像素尺寸 '+ow+'x'+oh+'，位置 ('+xo+','+yo+')');clearInterval(timer);if(canvasFrames.length>1)timer=setInterval(()=>{previewIndex=(previewIndex+1)%canvasFrames.length;drawPreview()},Math.max(20,canvasFrames[0].delay));return true}
function pixelate(fr,ow,oh,xo,yo,mode){let out=new Uint8ClampedArray(C*C*4);for(let i=0;i<C*C;i++)out[i*4+3]=255;const d=fr.rgba.data;for(let y=0;y<oh;y++){let ty=yo+y;if(ty<0||ty>=C)continue;for(let x=0;x<ow;x++){let tx=xo+x;if(tx<0||tx>=C)continue;let x0=Math.floor(crop.x+x*crop.w/ow),x1=Math.max(x0,Math.floor(crop.x+(x+1)*crop.w/ow)-1),y0=Math.floor(crop.y+y*crop.h/oh),y1=Math.max(y0,Math.floor(crop.y+(y+1)*crop.h/oh)-1);let r=0,g=0,b=0,a=0,n=mode?4:1;for(let sy=0;sy<(mode?2:1);sy++)for(let sx=0;sx<(mode?2:1);sx++){let px=mode?x0+Math.floor((x1-x0)*(sx*2+1)/4):Math.floor((x0+x1)/2),py=mode?y0+Math.floor((y1-y0)*(sy*2+1)/4):Math.floor((y0+y1)/2),k=(py*fr.w+px)*4;r+=d[k];g+=d[k+1];b+=d[k+2];a+=d[k+3]}[r,g,b]=enhance(r/n,g/n,b/n);let q=(ty*C+tx)*4;out[q]=r;out[q+1]=g;out[q+2]=b;out[q+3]=Math.round(a/n)}}return{delay:Math.max(20,fr.delay),rgba:new ImageData(out,C,C)}}
function drawPreview(){pctx.putImageData(canvasFrames[previewIndex]?.rgba||new ImageData(C,C),0,0)}
function pmxSize(n){return 24+n*8+n*FRAME_BYTES}
function makePmx(){if(!canvasFrames.length)render(false);const n=canvasFrames.length,bytes=pmxSize(n);if(bytes>ASSET_CAP)throw Error('PMX 超过 assets 分区容量：'+bytes);const b=new Uint8Array(bytes),v=new DataView(b.buffer);b.set([80,77,88,49,1,1,64,64],0);v.setUint32(8,n,true);v.setUint32(12,24,true);v.setUint32(16,24+n*8,true);v.setUint32(20,bytes,true);let off=24+n*8;for(let i=0;i<n;i++){v.setUint32(24+i*8,Math.max(20,canvasFrames[i].delay),true);v.setUint32(28+i*8,off+i*FRAME_BYTES,true)}for(let f=0;f<n;f++){const d=canvasFrames[f].rgba.data;for(let p=0;p<FRAME_BYTES;p++)b[off+f*FRAME_BYTES+p]=rgb332(d[p*4],d[p*4+1],d[p*4+2])}currentPmx=b;return b}
function parsePmx(b,name){if(b.length<24||String.fromCharCode(...b.slice(0,4))!=='PMX1')throw Error('不是 PMX1 文件');const v=new DataView(b.buffer,b.byteOffset,b.byteLength),n=v.getUint32(8,true),data=v.getUint32(16,true),size=v.getUint32(20,true);if(size!==b.length)throw Error('PMX 文件长度不匹配');canvasFrames=[];for(let i=0;i<Math.min(n,120);i++){const delay=v.getUint32(24+i*8,true),fo=v.getUint32(28+i*8,true),img=new ImageData(C,C);for(let p=0;p<FRAME_BYTES;p++){const [r,g,bb]=pal(b[fo+p]);img.data[p*4]=r;img.data[p*4+1]=g;img.data[p*4+2]=bb;img.data[p*4+3]=255}canvasFrames.push({delay,rgba:img})}drawPreview();$('srcInfo').textContent=name+' / PMX';$('outInfo').textContent=n+' 帧 / '+b.length+' 字节';status('已载入 PMX，可直接 HTTPS 上传。'+(n>120?' 预览只显示前 120 帧。':''))}
function saveBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function downloadPng(){if(!canvasFrames.length)render(false);preview.toBlob(b=>saveBlob(b,'matrix_first_frame.png'),'image/png')}
function downloadPmx(){try{saveBlob(new Blob([makePmx()],{type:'application/octet-stream'}),'matrix_content.pmx');status('PMX 已导出。')}catch(e){status(e.message,true)}}
function gifData(frames){let out=[71,73,70,56,57,97,64,0,64,0,247,0,0];for(let i=0;i<256;i++){const c=pal(i);out.push(c[0],c[1],c[2])}out.push(33,255,11,...[...('NETSCAPE2.0')].map(c=>c.charCodeAt(0)),3,1,0,0,0);for(const fr of frames){let inds=new Uint8Array(FRAME_BYTES),d=fr.rgba.data;for(let i=0;i<FRAME_BYTES;i++)inds[i]=rgb332(d[i*4],d[i*4+1],d[i*4+2]);out.push(33,249,4,0,Math.round(fr.delay/10)&255,(Math.round(fr.delay/10)>>8)&255,0,0,44,0,0,0,0,64,0,64,0,0,8);let data=lzwRaw(inds);for(let i=0;i<data.length;i+=255){let n=Math.min(255,data.length-i);out.push(n,...data.slice(i,i+n))}out.push(0)}out.push(59);return new Uint8Array(out)}
function lzwRaw(pix){let codes=[],i=0;while(i<pix.length){codes.push(256);let n=Math.min(254,pix.length-i);for(let j=0;j<n;j++)codes.push(pix[i++]);}codes.push(257);let bytes=[],buf=0,bits=0;for(const c of codes){buf|=c<<bits;bits+=9;while(bits>=8){bytes.push(buf&255);buf>>=8;bits-=8}}if(bits)bytes.push(buf&255);return bytes}
function downloadGif(){if(!canvasFrames.length)render(false);saveBlob(new Blob([gifData(canvasFrames)],{type:'image/gif'}),'matrix_animation.gif');status('GIF 已导出。')}
async function upload(){try{const pmx=currentPmx||makePmx();status('HTTPS 上传中：'+pmx.length+' 字节');const r=await fetch('/upload',{method:'POST',body:pmx});const t=await r.text();status((r.ok?'完成：':'失败：')+t,!r.ok);ping()}catch(e){status('上传失败：'+e.message,true)}}
async function ping(){try{const r=await fetch('/ping');$('devInfo').textContent=JSON.stringify(await r.json())}catch(e){$('devInfo').textContent='离线'}}
$('file').onchange=e=>e.target.files[0]&&decodeFile(e.target.files[0]).catch(err=>status('导入失败：'+err.message,true));['aspect','w','h','x','y','mode','brightness','contrast','saturation'].forEach(id=>$(id).oninput=()=>{syncLabels();if(id==='aspect')resetCrop();else render(true)});$('resetCrop').onclick=resetCrop;$('fitCanvas').onclick=()=>{setFit();render(true)};$('resetAdjust').onclick=()=>{['brightness','contrast','saturation'].forEach(id=>$(id).value=0);render(true)};$('downloadPng').onclick=downloadPng;$('downloadGif').onclick=downloadGif;$('downloadPmx').onclick=downloadPmx;$('upload').onclick=upload;
source.onmousedown=e=>{if(!srcFrames[0])return;const p=pt(e);dragging=true;moving=p.x>=crop.x&&p.x<=crop.x+crop.w&&p.y>=crop.y&&p.y<=crop.y+crop.h;anchor=p;dragOffset={x:p.x-crop.x,y:p.y-crop.y}};
source.onmousemove=e=>{if(!dragging||!srcFrames[0])return;const p=pt(e);if(moving){crop.x=clamp(p.x-dragOffset.x,0,srcFrames[0].w-crop.w);crop.y=clamp(p.y-dragOffset.y,0,srcFrames[0].h-crop.h)}else crop=makeCrop(anchor,p);drawSource();render(true)};
window.onmouseup=()=>{if(dragging){dragging=false;render(false)}};syncLabels();setFit();ping();setInterval(ping,5000);
</script>
</html>
